name: Refresh video cache

on:
  schedule:
    # 06:00 UTC daily
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Refresh cache
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: node scripts/refresh-cache.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/videos_cache.json
          if git diff --cached --quiet; then
            echo "No changes to videos_cache.json"
          else
            git commit -m "chore: refresh videos_cache.json"
            git push
          fi
