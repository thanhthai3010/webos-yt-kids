<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kids Videos</title>
  <style>
    /* Mirrors the app's "Toy Shelf" sky so the redirect gap looks intentional
       instead of a grey/black flash. */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-image:
        radial-gradient(circle at 92% -4%, rgba(255, 201, 60, 0.55) 0%, rgba(255, 201, 60, 0) 34%),
        linear-gradient(to bottom, #EAF7FF 0%, #CFEBFF 100%);
      background-repeat: no-repeat;
      color: #2B2250;
      font-family: 'Trebuchet MS', 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .sun {
      width: 90px;
      height: 90px;
      margin: 0 auto 28px;
      border-radius: 50%;
      background: #FFC93C;
      box-shadow: 0 6px 0 #F5A623;
      position: relative;
    }
    .sun:before, .sun:after {
      content: '';
      position: absolute;
      top: 33px;
      width: 12px;
      height: 14px;
      border-radius: 50%;
      background: #2B2250;
    }
    .sun:before { left: 24px; }
    .sun:after { right: 24px; }
    .sun i {
      position: absolute;
      left: 26px;
      right: 26px;
      top: 44px;
      height: 18px;
      border-bottom: 7px solid #2B2250;
      border-radius: 0 0 50% 50%;
    }
    h1 {
      font-size: 44px;
      font-weight: 800;
      margin: 0 0 14px;
    }
    p {
      font-size: 26px;
      margin: 0;
      color: #5B5480;
    }
    #fallback {
      display: none;
      max-width: 900px;
      margin-top: 26px;
      font-size: 26px;
      line-height: 1.5;
      color: #2B2250;
    }
    @media (max-width: 640px) {
      body { padding: 24px; box-sizing: border-box; }
      h1 { font-size: 30px; }
      p { font-size: 18px; }
      #fallback { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div>
    <div class="sun"><i></i></div>
    <h1>Kids Tube</h1>
    <p id="status">Starting&hellip;</p>
    <div id="fallback">
      <p>Could not reach the Kids Videos app.<br>
      Check that this TV is connected to the internet, then restart the app.</p>
    </div>
  </div>

  <script>
    // EDIT THIS: set to your GitHub Pages URL where app/ is hosted.
    // GitHub Pages serves the whole repo from root, so the app lives under
    // the /app/ path — keep the trailing /app/ segment. Must match the
    // Pages layout described in README.md.
    var HOSTED_APP_URL = "https://thanhthai3010.github.io/webos-yt-kids/app/";

    window.location.href = HOSTED_APP_URL;

    // If redirect hasn't happened within 5s (e.g. no network), show a message.
    setTimeout(function () {
      document.getElementById("status").style.display = "none";
      document.getElementById("fallback").style.display = "block";
    }, 5000);
  </script>
</body>
</html>
